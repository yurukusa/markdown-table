<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}

.btn{padding:6px 14px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:0.78rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#ccc}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.danger{border-color:#ef4444;color:#ef4444}
.btn.danger:hover{background:#ef4444;color:#fff}

.table-wrap{overflow-x:auto;margin-bottom:16px;border:1px solid #222;border-radius:10px;background:#0d0d0d}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #222;padding:0;position:relative}
th{background:#1a2744}
td{background:#0d0d0d}
th input,td input{width:100%;padding:10px 12px;border:none;background:transparent;color:#e6e6e6;font-size:0.85rem;outline:none;font-family:inherit}
th input{color:#4da6ff;font-weight:600}
th input:focus,td input:focus{background:#111;box-shadow:inset 0 0 0 2px #3b82f6}

.align-row{display:flex;gap:2px;justify-content:center}
.align-btn{padding:2px 6px;border-radius:3px;border:1px solid #333;background:none;color:#555;font-size:0.65rem;cursor:pointer}
.align-btn.active{border-color:#3b82f6;color:#4da6ff}

.col-header{display:flex;flex-direction:column;align-items:stretch}
.col-header input{text-align:center}

.row-num{width:30px;text-align:center;color:#333;font-size:0.68rem;background:#111;padding:10px 4px;user-select:none}

.presets{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.preset-btn{padding:4px 10px;border-radius:6px;border:1px solid #222;background:#0d0d0d;color:#555;font-size:0.72rem;cursor:pointer}
.preset-btn:hover{border-color:#3b82f6;color:#888}

.output-section{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.output-pane{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:14px;cursor:pointer}
.output-pane:hover{border-color:#3b82f6}
.output-pane h3{font-size:0.78rem;color:#888;margin-bottom:6px}
.output-pane pre{font-family:'Fira Code',monospace;font-size:0.75rem;color:#10b981;white-space:pre-wrap;max-height:200px;overflow:auto}
.output-pane .hint{font-size:0.72rem;color:#555;margin-top:6px}

.preview-pane{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:14px}
.preview-pane h3{font-size:0.78rem;color:#888;margin-bottom:6px}
.preview-table{width:100%;border-collapse:collapse;font-size:0.82rem}
.preview-table th{background:#1a2744;color:#4da6ff;padding:8px 12px;border:1px solid #333;font-weight:600}
.preview-table td{padding:8px 12px;border:1px solid #222}
.preview-table td[style*="text-align: center"]{text-align:center}
.preview-table td[style*="text-align: right"]{text-align:right}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

footer a:hover{color:#999}
@media(max-width:700px){.output-section{grid-template-columns:1fr}}

<body>
<div class="container">
<h1>Markdown Table</h1>
<p class="subtitle">Visual table generator. Edit cells, copy markdown or HTML.</p>

<div class="presets">
  <button class="preset-btn" onclick="preset(3,3)">3×3</button>
  <button class="preset-btn" onclick="preset(4,5)">4×5</button>
  <button class="preset-btn" onclick="preset(2,4)">2×4</button>
  <button class="preset-btn" onclick="presetComparison()">Comparison</button>
  <button class="preset-btn" onclick="presetAPI()">API Docs</button>
</div>

<div class="toolbar">
  <button class="btn" onclick="addCol()">+ Column</button>
  <button class="btn" onclick="addRow()">+ Row</button>
  <button class="btn danger" onclick="removeCol()">- Column</button>
  <button class="btn danger" onclick="removeRow()">- Row</button>
  <button class="btn" onclick="clearAll()">Clear</button>
</div>

<div class="table-wrap">
  <table id="editTable"></table>
</div>

<div class="output-section">
  <div class="output-pane" onclick="copyMd()">
    <h3>Markdown</h3>
    <pre id="mdOutput"></pre>
    <div class="hint">Click to copy</div>
  </div>
  <div class="preview-pane">
    <h3>Preview</h3>
    <div id="previewArea"></div>
  </div>
</div>
</div>

<footer>
  <a href="https://github.com/yurukusa/markdown-table">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
let colCount=3,rowCount=3;
let headers=['Header 1','Header 2','Header 3'];
let aligns=['left','left','left'];
let data=[['','',''],['','','']];

function preset(c,r){
  colCount=c;rowCount=r;
  headers=[];aligns=[];data=[];
  for(let i=0;i<c;i++){headers.push('Header '+(i+1));aligns.push('left')}
  for(let i=0;i<r-1;i++){const row=[];for(let j=0;j<c;j++)row.push('');data.push(row)}
  render();
}

function presetComparison(){
  colCount=4;rowCount=5;
  headers=['Feature','Free','Pro','Enterprise'];
  aligns=['left','center','center','center'];
  data=[
    ['Storage','5 GB','50 GB','Unlimited'],
    ['Users','1','10','Unlimited'],
    ['Support','Email','Priority','24/7'],
    ['Price','$0','$29/mo','Contact us']
  ];
  render();
}

function presetAPI(){
  colCount=4;rowCount=5;
  headers=['Method','Endpoint','Description','Auth'];
  aligns=['left','left','left','center'];
  data=[
    ['GET','/api/users','List all users','✓'],
    ['POST','/api/users','Create user','✓'],
    ['GET','/api/users/:id','Get user by ID','✓'],
    ['DELETE','/api/users/:id','Delete user','Admin']
  ];
  render();
}

function addCol(){
  if(colCount>=8)return;
  colCount++;
  headers.push('Header '+colCount);
  aligns.push('left');
  data.forEach(r=>r.push(''));
  render();
}
function removeCol(){
  if(colCount<=1)return;
  colCount--;
  headers.pop();aligns.pop();
  data.forEach(r=>r.pop());
  render();
}
function addRow(){
  if(data.length>=20)return;
  const row=[];for(let i=0;i<colCount;i++)row.push('');
  data.push(row);
  rowCount=data.length+1;
  render();
}
function removeRow(){
  if(data.length<=1)return;
  data.pop();
  rowCount=data.length+1;
  render();
}
function clearAll(){
  data=data.map(r=>r.map(()=>''));
  render();
}

function syncFromUI(){
  const table=document.getElementById('editTable');
  const hInputs=table.querySelectorAll('thead input');
  hInputs.forEach((inp,i)=>{if(i<colCount)headers[i]=inp.value});
  const rows=table.querySelectorAll('tbody tr');
  rows.forEach((tr,ri)=>{
    const inputs=tr.querySelectorAll('input');
    inputs.forEach((inp,ci)=>{if(ri<data.length&&ci<colCount)data[ri][ci]=inp.value});
  });
}

function setAlign(col,align){
  syncFromUI();
  aligns[col]=align;
  render();
}

function render(){
  const table=document.getElementById('editTable');
  let html='<thead><tr>';
  for(let c=0;c<colCount;c++){
    html+=`<th><div class="col-header">
      <input value="${esc(headers[c])}" oninput="onEdit()">
      <div class="align-row">
        <button class="align-btn ${aligns[c]==='left'?'active':''}" onclick="setAlign(${c},'left')">L</button>
        <button class="align-btn ${aligns[c]==='center'?'active':''}" onclick="setAlign(${c},'center')">C</button>
        <button class="align-btn ${aligns[c]==='right'?'active':''}" onclick="setAlign(${c},'right')">R</button>
      </div>
    </div></th>`;
  }
  html+='</tr></thead><tbody>';
  data.forEach((row,ri)=>{
    html+='<tr>';
    for(let c=0;c<colCount;c++){
      html+=`<td><input value="${esc(row[c]||'')}" oninput="onEdit()"></td>`;
    }
    html+='</tr>';
  });
  html+='</tbody>';
  table.innerHTML=html;
  generateOutput();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function onEdit(){
  syncFromUI();
  generateOutput();
}

function generateOutput(){
  // Markdown
  const pad=(s,w)=>s+' '.repeat(Math.max(0,w-s.length));
  const widths=headers.map((h,i)=>Math.max(h.length,...data.map(r=>(r[i]||'').length),3));

  let md='| '+headers.map((h,i)=>pad(h,widths[i])).join(' | ')+' |\n';
  md+='| '+aligns.map((a,i)=>{
    const w=widths[i];
    if(a==='center')return':'+'-'.repeat(w-2)+':';
    if(a==='right')return'-'.repeat(w-1)+':';
    return '-'.repeat(w);
  }).join(' | ')+' |\n';
  data.forEach(row=>{
    md+='| '+row.map((cell,i)=>pad(cell||'',widths[i])).join(' | ')+' |\n';
  });

  document.getElementById('mdOutput').textContent=md;

  // Preview
  let preview='<table class="preview-table"><thead><tr>';
  headers.forEach(h=>preview+=`<th>${esc(h)}</th>`);
  preview+='</tr></thead><tbody>';
  data.forEach(row=>{
    preview+='<tr>';
    row.forEach((cell,ci)=>{
      const style=aligns[ci]!=='left'?` style="text-align: ${aligns[ci]}"`:'';
      preview+=`<td${style}>${esc(cell||'')}</td>`;
    });
    preview+='</tr>';
  });
  preview+='</tbody></table>';
  document.getElementById('previewArea').innerHTML=preview;
}

function copyMd(){
  navigator.clipboard.writeText(document.getElementById('mdOutput').textContent);
  const el=document.createElement('div');
  el.className='copied';el.textContent='Markdown Copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

render();
</script>
